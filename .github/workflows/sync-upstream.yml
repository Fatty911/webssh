name: Sync Upstream

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.repository.fork }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/huashengdun/webssh.git || echo "Remote already exists."
          git fetch upstream master

      - name: Sync master branch
        run: |
          set -e
          git checkout master

          if [ "$(git rev-parse master)" = "$(git rev-parse upstream/master)" ]; then
            echo "Already up-to-date with upstream"
            exit 0
          fi

          if git merge-base --is-ancestor master upstream/master; then
            echo "Fast-forward possible, merging..."
            git merge --ff-only upstream/master
            git push origin master
            echo "Sync completed (fast-forward)"
            exit 0
          fi

          echo "Diverged, creating merge commit..."
          # Save local workflow files before merge (GITHUB_TOKEN cannot push workflow changes)
          rm -rf /tmp/local-wf
          mkdir -p /tmp/local-wf
          cp -r .github/workflows/ /tmp/local-wf/ 2>/dev/null || true

          git merge upstream/master --no-edit --no-commit || true
          # Auto-resolve conflicts: accept upstream for everything except workflows
          git checkout --theirs . 2>/dev/null || true
          git add -A 2>/dev/null || true
          # Restore local workflow files
          rm -rf .github/workflows/
          cp -r /tmp/local-wf/ .github/workflows/
          git add .github/workflows/
          git commit -m "chore: sync upstream (preserve local workflows) [auto-sync]" || true

          # Push; if still fails, force-restore workflows from origin
          if ! git push origin master 2>/dev/null; then
            echo "Push failed, force-restoring workflows from origin..."
            git fetch origin master
            git checkout origin/master -- .github/workflows/ 2>/dev/null || true
            git add .github/workflows/
            git commit --amend --no-edit --allow-empty || true
            git push origin master
          fi
          echo "Sync completed"
